<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags em HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual lag deverá utilizar em cada caso</p>

    <ul>
        <li><abbr title="Usar a tag &lt; p &gt;">Paragrafo</abbr></li>
        <li><abbr title="Usar a tag &lt; H1 &gt; ">Titulo</abbr></li>
        <li><abbr title="Usar a tag &lt; img &gt;">Imagens</abbr></li>
        <li><abbr title="Usar a tag &lt; abbr &gt;">Abreviações</abbr></li>
        <li><abbr title="Usar a tag &lt; code &gt;">Codigo-fontes</abbr></li>
        <li><abbr title="Usar a tag &lt; ol &gt;">Lista numeradas</abbr></li>
        <li><abbr title="Usar a tag &lt; ul &gt;">Lista com demarcadores</abbr></li>
    </ul>
</body>
</html>
