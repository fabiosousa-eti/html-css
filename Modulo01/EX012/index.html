<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmnente</h1>
    <p>Estes videos estão hospedados localmente no seu servidor.</p>

    <video width="500" poster="./imagens/limoes-capa.png" controls loop>
    <source src="./midia/meu-video.mp4" type="video/mp4">
    <source src="./midia/meu-video.m4v" type="video/webm">
    <source src="./midia/meu-video.ogv" type="video/ogg">
    <source src="./midia/meu-video.webm" type="video/ogg">
    </video>

    <h1>Estes videos estão hospedados externamente.</h1>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/vu4TUHOP4fA?si=TC2ROoHoJSAJA9eH" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>


</body>
</html>
