<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 {
            /* Padrão box-level */
            background-color: lightgray;
            height: 300px;
            width: 300px;
            /*border-width: 10px;
            border-style: solid;
            border-color: darkslategray;*/
            border: 10px solid darkslategray;

            /*  padding-top: 10px;
                padding-right: 10px;
                padding-bottom: 10px;
                padding-left: 10px;*/
            /*  padding: 10px 10px 10px 10px; 
                padding: 10px 20px; (top e bottom 10px, left e right 20px)
                padding: 10px; */
            padding: 10px auto;
            /*(top e bottom 10px, left e right auto)*/


            /*  margin-top: 20px;
                margin-right: 20px;
                margin-left: 20px;
                margin-bottom: 20px;*/
            /*  margin: 20px 20px 20px 20px;
                margin: 20px 0px; (top e bottom 20px, left e right 0px)
                margin: 20px;*/
            margin: 20px auto;
            /*(top e bottom 10px, left e right auto)*/

            outline-width: 5px;
            outline-style: dashed;
            outline-color: salmon;
        }

        a {
            /* Padrão inline-level */
            border-width: 10px;
            border-style: solid;
            border-color: red;
        }
    </style>
</head>

<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Paragrafos tambem são Exemplo de box-level mas os <a href="#">links são exemplos de caixa inline-level</a>. Vamos
        ver como tudo isso funciona</p>
</body>

</html>
