<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        div.container{
            border: 3px solid blue;
            display: grid;
            grid-template-rows: minmax(10% , 60%);
            grid-template-columns: 100px 40% repeat(2, 1fr);
            grid-auto-flow: row;
            grid-auto-rows: 80px;
            grid-auto-columns: 120px;
            gap: 10px;
            place-items: normal normal;
            place-content: normal normal;
        }
        div.box{
            border: 3px solid red;
            padding: 5PX;
        }
    </style>
    <title>Grid Layout na Prática</title>
</head>
<body>
    <div class="container">
        <div class="box">A</div>
        <div class="box">B</div>
        <div class="box">C</div>
        <div class="box">D</div>
        <div class="box">E</div>
        <div class="box">F</div>
        <div class="box">G</div>
        <div class="box">H</div>
        <div class="box">I</div>
        <div class="box">J</div>
    </div>
</body>
</html>
