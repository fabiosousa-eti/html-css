<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.container{
            background-color: lightsalmon;
            display: flex;
            flex-flow: row nowrap;
        }
        div.itens{
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;
            flex-basis: 250px;
            flex-shrink: 1;
            flex-grow: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="itens">Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptatibus, accusamus!</div>
        <div class="itens">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Autem, laboriosam alias? Nostrum voluptas tempore doloribus.</div>
        <div class="itens">Lorem ipsum dolor sit amet.</div>
    </div>
</body>
</html>
