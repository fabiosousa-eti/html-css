<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.container{
            background-color: lightsalmon;

            display: flex;
            flex-flow: row nowrap;
        }
        div.itens{
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;
            flex-basis: 130px;

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="itens">A</div>
        <div class="itens">ABC</div>
        <div class="itens">ABCD</div>
        <div class="itens">ABCDE</div>
        <div class="itens">ABCDEF</div>
        <div class="itens">ABCDEFG</div>
        <div class="itens">ABCDEFGH</div>
    </div>
</body>
</html>
